<style>
	@font-face {
    src: url("css/fonts/Jack.ttf");
    font-family: "Jack";
  }

*{font-family: "Jack";}

	img { max-width: 100% }

    body {
	background-color: #FDF7F4;

    }

	.rotate {
		 width: fit-content;
		 height: fit-content;
		 display: inline-block;
		 position: absolute;
	}
	.rotate:hover img, .rotate:focus img {
		 transform: rotate(3deg);
	}
	.rotate:hover .text, a:focus .text {
		 opacity: 1;
	}

	.text {
		 filter: drop-shadow(1px 1px 0 black)
		 drop-shadow(-1px 1px 0 black);
		 font-family: "Seraphim";
		 z-index: 99;
	}
	:root { overscroll-behavior: none; }
	html { overflow-Y: scroll; }
	body { padding: 0; }
	h1 { margin: 0.5rem 0.5rem 0.25rem 0.5rem; }

	h2 { padding: 10px;
  		background: #8EB486;
  		color: #FDF7F4; }

	main { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; max-width: 100%; }
	section { width: 30rem; max-width: 100%; margin: 1rem; }
	main a { display: block; 
		padding: 1rem; 
		margin: 1.5rem 1rem; 
		max-width: 100%; 
		border: 3px double; 
		font-size: 1.5rem; 
		text-decoration: none; 
		text-transform: lowercase; 
		background: #FDF7F4; 
		opacity: 0.9; }
	title { color: #997C70; }
	a p { font-size: 1rem; margin: 0.25rem 1rem;color: rgb(209, 109, 37); }
	a time { display: block; margin: 0 0 0.5rem 0; font-size: 0.6em; border: none; padding: 0; text-align: left; }
	img { display: block; margin:auto; position: sticky; top: 40%; }
	input { margin-left: 0.5rem; }
	main a::after {
		display: block;
		text-align: right;
		font-size: 0.6em; 
		margin-top: 0.5rem;
	}


	.main_text {
		color: #685752;
		text-align: justify;
		line-height: 125%;
		font-family: "Jack";
	}

	.dotted_container {
	
		border: 3px dotted #58412D;
		padding: 10px 10px 10px 20px;
		margin: 10px 10px 10px -30px;
	}
</style>
